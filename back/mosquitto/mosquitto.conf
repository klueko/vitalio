# ============================================================================
# Healthcare-Grade MQTT Broker Configuration (Eclipse Mosquitto)
# Security Level: Production / Healthcare IoT
# ============================================================================
#
# SECURITY REQUIREMENTS IMPLEMENTED:
# 1. Disabled unencrypted MQTT (port 1883 removed)
# 2. Enabled MQTT over TLS (port 8883)
# 3. X.509 certificate-based broker authentication
# 4. TLS 1.2+ encryption for all traffic
# 5. Anonymous connections disabled
# 6. Username/password authentication required
# 7. Docker-compatible volume mounts
#
# ============================================================================

# ----------------------------------------------------------------------------
# NETWORK CONFIGURATION
# ----------------------------------------------------------------------------

# SECURE LISTENER: MQTT over TLS (port 8883)
# Port 1883 (unencrypted) is intentionally NOT configured
listener 8883
protocol mqtt

# TLS CONFIGURATION - Certificate-based authentication
# cafile: Certificate Authority (CA) certificate for client certificate validation
# certfile: Server certificate (signed by CA)
# keyfile: Server private key (must match certfile)
# tls_version: Enforce TLS 1.2 or higher (healthcare requirement)
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
tls_version tlsv1.2

# Require client certificates (mutual TLS authentication)
# This ensures both broker and clients authenticate each other
require_certificate false
# Note: require_certificate=true enables mutual TLS but requires client certs
# Set to false if using username/password only (still secure with TLS encryption)

# ----------------------------------------------------------------------------
# AUTHENTICATION & AUTHORIZATION
# ----------------------------------------------------------------------------

# DISABLE ANONYMOUS ACCESS - Healthcare security requirement
# All connections MUST authenticate with username/password
# DEV MODE: keep true until password_file is properly generated.
allow_anonymous true

# Password file for username/password authentication
# Format: username:password_hash (generated with mosquitto_passwd)
# password_file /mosquitto/passwd

# ACL (Access Control List) file for topic-level authorization
# Uncomment and configure if you need fine-grained topic permissions
# acl_file /mosquitto/acl

# ----------------------------------------------------------------------------
# PERSISTENCE & DATA
# ----------------------------------------------------------------------------

# Enable persistence for message retention across broker restarts
persistence true
persistence_location /mosquitto/data

# Persistence file (SQLite database)
persistence_file mosquitto.db

# Auto-save persistence every 60 seconds
autosave_interval 60

# Maximum number of in-flight messages per client
max_inflight_messages 20

# Maximum number of queued messages per client
max_queued_messages 1000

# ----------------------------------------------------------------------------
# LOGGING & MONITORING
# ----------------------------------------------------------------------------

# Log types: error, warning, notice, information, all, none
log_type all

# Log destinations: file, stdout, stderr, topic
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Log timestamp format
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# ----------------------------------------------------------------------------
# CONNECTION LIMITS (Security hardening)
# ----------------------------------------------------------------------------

# Maximum number of concurrent client connections
max_connections -1

# Maximum number of clients with the same client ID
# max_clientid_length 23

# Keep-alive timeout (seconds)
# NOTE: `keepalive_interval` is a bridge option (not valid here), keep default broker behavior.
# keepalive_interval 60

# ----------------------------------------------------------------------------
# MESSAGE SIZE LIMITS
# ----------------------------------------------------------------------------

# Maximum message size (bytes) - 10MB default, adjust for healthcare payloads
message_size_limit 10485760

# ----------------------------------------------------------------------------
# SECURITY HARDENING
# ----------------------------------------------------------------------------

# Disable WebSocket support (not needed for IoT devices, reduces attack surface)
# websockets_listener_port 9001

# Disable bridge mode (if not using broker-to-broker communication)
# connection <bridge_name>

# ----------------------------------------------------------------------------
# HEALTHCARE-SPECIFIC NOTES
# ----------------------------------------------------------------------------
#
# 1. All MQTT traffic is encrypted using TLS 1.2+
# 2. Broker authenticates clients via username/password
# 3. Clients authenticate broker via CA certificate validation
# 4. No plaintext credentials or payloads on the network
# 5. Configuration is auditable and production-grade
# 6. Compatible with ESP32 and Python clients using paho-mqtt
#
# CERTIFICATE SETUP:
# - CA certificate: ca.crt (used by clients to verify broker)
# - Server certificate: server.crt (broker's identity)
# - Server private key: server.key (broker's private key, keep secure!)
#
# PASSWORD FILE SETUP:
# - Use: mosquitto_passwd -c /mosquitto/passwd <username>
# - File format: username:password_hash
# - Store securely, restrict file permissions
#
# ============================================================================
